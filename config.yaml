# LLM Red Team Agent — Configuration

target:
  provider: openai          # openai | ollama | anthropic | custom
  base_url: "https://api.openai.com/v1"
  model: "gpt-4o"
  api_key_env: "OPENAI_API_KEY"  # Read from env var

attacks:
  enabled:
    - prompt_injection
    - jailbreak
    - system_prompt_leak
    - pii_extraction
    - tool_misuse
    - encoding_bypass
    - crescendo              # Multi-turn escalation (NEW)

judge:
  enabled: true                   # false = heuristics only
  provider: ollama                # ollama (free local) | openai | anthropic
  base_url: "http://localhost:11434"
  model: "llama3.2"               # Claude 3 Haiku recommended for production
  api_key_env: "JUDGE_API_KEY"    # Only needed for openai/anthropic
  confidence_threshold: 0.75      # Verdicts below this → treated as inconclusive
  temperature: 0                  # Deterministic — same prompt → same verdict
  max_tokens: 300                 # Judge responses are short JSON

multi_turn:
  max_turns: 6                    # Max conversation turns per scenario
  escalation_detection: true      # Judge checks for escalation patterns
  conversation_timeout: 120       # Seconds timeout per full conversation

report:
  output_dir: "reports"
  format: markdown           # markdown | html (future)

execution:
  concurrency: 1             # Sequential for now (rate limits)
  timeout_per_attack: 60     # Seconds
