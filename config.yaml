# LLM Red Team Agent — Configuration

target:
  provider: ollama
  base_url: "http://localhost:11434"
  model: "llama3.2"
  api_key_env: "OPENAI_API_KEY"

attacks:
  enabled:
    - prompt_injection
    - jailbreak
    - system_prompt_leak
    - pii_extraction
    - tool_misuse
    - encoding_bypass
    - crescendo

judge:
  enabled: true
  provider: ollama
  base_url: "http://localhost:11434"
  model: "llama3.2"
  api_key_env: "JUDGE_API_KEY"
  confidence_threshold: 0.75
  temperature: 0
  max_tokens: 300

multi_turn:
  max_turns: 6
  escalation_detection: true
  conversation_timeout: 120

report:
  output_dir: "reports"
  format: markdown

execution:
  concurrency: 1             # 1 = sequential (Ollama), 4-8 = parallel (cloud APIs)
  timeout_per_attack: 60     # Seconds per module
  fast_scan: false           # true = only top-3 payloads per module
  fast_payload_limit: 3      # Max payloads in fast mode
